pipeline_name: customers
owner: customer_success
source:
  type: csv
  path: data_sources/customers.csv
destination:
  schema: raw
  table: customers
schedule:
  cron: "0 */6 * * *"
load_mode: append
runtime_parameters:
  batch_size: 1000
transform: {}
quality_checks:
  enabled: true
  checks:
    - name: not_null_customer_id
      column: customer_id
      rule: not_null
    - name: not_null_full_name
      column: full_name
      rule: not_null
    - name: unique_customer_id
      column: customer_id
      rule: unique
